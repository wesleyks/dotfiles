interface:
  display_name: "Execute Plan"
  short_description: "Execute an approved plan; do not write it"
  default_prompt: "Use $execute-plan in the form /execute-plan <folder>. Read the spec from docs/features/in-progress/<folder>/spec.md and the plan from docs/features/in-progress/<folder>/plan.md, then execute exactly one plan step in this invocation and update docs/features/in-progress/<folder>/plan-status.md as the live execution record. Treat the spec as authoritative for behavior, validate after meaningful changes, surface blockers or deviations instead of silently replanning, and if this invocation completes the final remaining step move the feature folder to docs/features/completed/<folder>/."
